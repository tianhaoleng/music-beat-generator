<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐伴奏生成器 - 一键生成原创伴奏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .header p {
            color: #999;
            font-size: 14px;
        }

        .control-group {
            margin-bottom: 25px;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .style-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .style-btn {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .style-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .style-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(102, 126, 234, 0.4);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 5px rgba(102, 126, 234, 0.4);
        }

        .value-display {
            min-width: 50px;
            text-align: right;
            font-weight: 600;
            color: #667eea;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 1 / -1;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-download {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-download:hover {
            background: #e0e0e0;
        }

        .btn-preview {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-preview:hover {
            background: #e0e0e0;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.loading {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        .audio-player {
            margin-top: 15px;
            display: none;
        }

        .audio-player.show {
            display: block;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        .info-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 音乐伴奏生成器</h1>
            <p>几个参数，生成原创伴奏</p>
        </div>

        <form id="form">
            <!-- 音乐风格选择 -->
            <div class="control-group">
                <label>选择音乐风格</label>
                <div class="style-buttons">
                    <button type="button" class="style-btn active" data-style="rap">🎤 说唱</button>
                    <button type="button" class="style-btn" data-style="electronic">⚡ 电子</button>
                    <button type="button" class="style-btn" data-style="trap">🔊 Trap</button>
                    <button type="button" class="style-btn" data-style="deep">🌊 深电子</button>
                </div>
            </div>

            <!-- BPM调整 -->
            <div class="control-group">
                <label>速度 (BPM)</label>
                <div class="slider-container">
                    <input type="range" id="bpm" min="60" max="180" value="90" step="1">
                    <div class="value-display"><span id="bpmValue">90</span> BPM</div>
                </div>
            </div>

            <!-- 长度调整 -->
            <div class="control-group">
                <label>长度</label>
                <div class="slider-container">
                    <input type="range" id="length" min="30" max="300" value="60" step="10">
                    <div class="value-display"><span id="lengthValue">60</span>s</div>
                </div>
            </div>

            <!-- 强度调整 -->
            <div class="control-group">
                <label>强度</label>
                <div class="slider-container">
                    <input type="range" id="intensity" min="1" max="10" value="5" step="1">
                    <div class="value-display"><span id="intensityValue">5</span>/10</div>
                </div>
            </div>

            <!-- 按钮组 -->
            <div class="button-group">
                <button type="button" class="btn-preview" id="previewBtn">🎧 预听</button>
                <button type="button" class="btn-download" id="downloadBtn" disabled>⬇️ 下载MP3</button>
                <button type="submit" class="btn-generate" id="generateBtn">✨ 生成伴奏</button>
            </div>
        </form>

        <!-- 状态信息 -->
        <div class="status" id="status"></div>

        <!-- 音乐播放器 -->
        <div class="audio-player" id="audioPlayer">
            <audio id="audio" controls></audio>
        </div>

        <!-- 信息框 -->
        <div class="info-box">
            💡 <strong>提示：</strong>点击「生成伴奏」开始创作，生成后可预听或下载MP3文件。
        </div>
    </div>

    <!-- 引入Tone.js库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <!-- 引入自定义脚本 -->
    <script src="app.js"></script>
</body>
</html>
